<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>肌肉记忆</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💪</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600&family=EB+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-color: #faf8f5;
      --card-bg: #ffffff;
      --text-main: #2c2c2c;
      --text-muted: #7c7263;
      --text-light: #9e9485;
      --border-color: rgba(225, 218, 208, 0.4);
      --accent-color: #c5b9a8;
    }

    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      font-size: 16px;
      scroll-behavior: smooth;
    }

    body {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--bg-color);
      color: var(--text-main);
      font-family: 'Noto Serif SC', 'Georgia', serif;
      overflow: hidden;
      position: relative;
    }

    /* subtle grain texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      opacity: 0.04;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-size: 256px 256px;
      pointer-events: none;
      z-index: 10;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      width: 100%;
      perspective: 1000px;
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 3.8rem 3rem 2.5rem 3rem;
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      align-items: center;
      box-shadow: 
        0 20px 40px rgba(58, 50, 40, 0.03),
        0 10px 20px rgba(58, 50, 40, 0.02),
        0 0 0 1px rgba(225, 218, 208, 0.15);
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.6s cubic-bezier(0.165, 0.84, 0.44, 1), box-shadow 0.6s cubic-bezier(0.165, 0.84, 0.44, 1);
      animation: cardAppear 1.2s cubic-bezier(0.165, 0.84, 0.44, 1) forwards;
    }

    .card:hover {
      transform: translateY(-4px) rotateX(1deg) rotateY(-0.5deg);
      box-shadow: 
        0 30px 60px rgba(58, 50, 40, 0.05),
        0 12px 24px rgba(58, 50, 40, 0.03),
        0 0 0 1px rgba(225, 218, 208, 0.2);
    }

    @keyframes cardAppear {
      from {
        opacity: 0;
        transform: translateY(30px) rotateX(-2deg);
      }
      to {
        opacity: 1;
        transform: translateY(0) rotateX(0);
      }
    }

    .stamp-container {
      margin-bottom: 2.5rem;
      position: relative;
    }

    .stamp {
      width: 72px;
      height: 72px;
      background: radial-gradient(circle, #fdfbfa 0%, #f5eee4 100%);
      border: 1.5px solid #e1dad0;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      box-shadow: 
        inset 0 2px 5px rgba(255, 255, 255, 0.8),
        inset 0 -2px 5px rgba(0, 0, 0, 0.02),
        0 4px 12px rgba(58, 50, 40, 0.05);
      user-select: none;
      transform: rotate(-5deg);
      transition: transform 0.5s ease;
    }

    .card:hover .stamp {
      transform: rotate(5deg) scale(1.02);
    }

    .quote-container {
      width: 100%;
      text-align: center;
      margin-bottom: 2.2rem;
    }

    .quote {
      font-size: 1.85rem;
      font-weight: 400;
      color: var(--text-main);
      letter-spacing: 0.18em;
      line-height: 1.5;
      text-indent: 0.09em; /* balance the trailing letter-spacing */
      position: relative;
      display: inline-block;
    }

    .quote sup {
      font-size: 0.85rem;
      vertical-align: super;
      color: var(--accent-color);
      margin-left: 0.15rem;
      font-family: 'EB Garamond', serif;
      font-weight: 400;
      cursor: help;
      transition: color 0.3s ease;
    }

    .quote sup:hover {
      color: #9e9485;
    }

    .divider {
      width: 32px;
      height: 1px;
      background-color: var(--border-color);
      margin-bottom: 2.2rem;
      position: relative;
    }

    .divider::after {
      content: '';
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%) rotate(45deg);
      width: 4px;
      height: 4px;
      background-color: var(--accent-color);
    }

    .footnotes {
      width: 100%;
      border-top: 1px dashed rgba(225, 218, 208, 0.4);
      padding-top: 1.5rem;
      margin-bottom: 0.8rem;
    }

    .footnote-item {
      font-size: 0.82rem;
      line-height: 1.8;
      color: var(--text-muted);
      text-align: justify;
      letter-spacing: 0.05em;
      transition: color 0.3s ease;
    }

    .footnote-item .marker {
      font-family: 'EB Garamond', serif;
      font-weight: 400;
      color: var(--accent-color);
      margin-right: 0.3rem;
    }

    .card:hover .footnote-item {
      color: #5c5344;
    }

    .date-container {
      width: 100%;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      margin-top: 0.8rem;
    }

    .date-text {
      font-size: 0.85rem;
      color: var(--text-light);
      font-family: 'EB Garamond', 'Noto Serif SC', serif;
      font-style: italic;
      letter-spacing: 0.08em;
    }

    @media (max-width: 500px) {
      .container {
        padding: 1.2rem;
      }
      .card {
        padding: 2.8rem 1.8rem 2rem 1.8rem;
        border-radius: 12px;
      }
      .quote {
        font-size: 1.55rem;
        letter-spacing: 0.12em;
        text-indent: 0.06em;
      }
      .stamp {
        width: 64px;
        height: 64px;
        font-size: 1.75rem;
      }
      .footnote-item {
        font-size: 0.78rem;
        line-height: 1.7;
      }
    }
  </style>
</head>
<body>
  <main class="container">
    <article class="card">
      <div class="stamp-container">
        <div class="stamp">💪</div>
      </div>
      <div class="quote-container">
        <p class="quote">我非常内向<sup>[1]</sup></p>
      </div>
      <div class="divider"></div>
      <div class="footnotes">
        <p class="footnote-item">
          <span class="marker">[1]</span>社交只是我的肌肉记忆。
        </p>
      </div>
      <div class="date-container">
        <span class="date-text">致敬 2026.06.27</span>
      </div>
    </article>
  </main>
</body>
</html>
