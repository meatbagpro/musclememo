<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>肌肉记忆</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💪</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600&family=EB+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      font-size: 16px;
      scroll-behavior: smooth;
    }

    body {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #faf8f5;
      color: #3a3a3a;
      font-family: 'Noto Serif SC', 'Georgia', serif;
      overflow: hidden;
      position: relative;
    }

    /* subtle grain texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-size: 256px 256px;
      pointer-events: none;
      z-index: 10;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      max-width: 960px;
      width: 100%;
      animation: fadeIn 1.8s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .image-frame {
      width: 100%;
      max-width: 420px;
      position: relative;
      margin-bottom: 2.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      box-shadow:
        0 4px 24px rgba(0, 0, 0, 0.06),
        0 1px 4px rgba(0, 0, 0, 0.04);
      background: #f2ede6;
      aspect-ratio: 1 / 1;
    }

    .image-frame .glyph {
      font-size: clamp(8rem, 28vw, 14rem);
      line-height: 1;
      user-select: none;
    }

    .caption {
      text-align: center;
      max-width: 520px;
      padding: 0 1rem;
    }

    .caption .quote {
      font-size: 1.25rem;
      font-weight: 300;
      line-height: 2;
      letter-spacing: 0.08em;
      color: #4a4a4a;
      margin-bottom: 1.5rem;
      position: relative;
    }

    .caption .quote::before {
      content: '\201C';
      position: absolute;
      left: -1.2em;
      top: -0.15em;
      font-size: 2.5rem;
      font-family: 'EB Garamond', serif;
      color: #c5b9a8;
      line-height: 1;
    }

    .caption .attribution {
      font-size: 0.85rem;
      font-weight: 400;
      color: #9a8e7f;
      letter-spacing: 0.15em;
      font-family: 'EB Garamond', 'Noto Serif SC', serif;
      font-style: italic;
    }

    .caption .attribution .dash {
      display: inline-block;
      width: 2em;
      height: 1px;
      background: #c5b9a8;
      vertical-align: middle;
      margin-right: 0.6em;
    }

    @media (max-width: 640px) {
      .container { padding: 1.5rem 1rem; }

      .image-frame { max-width: 280px; margin-bottom: 2rem; }

      .caption .quote {
        font-size: 1.05rem;
        line-height: 1.9;
        letter-spacing: 0.05em;
      }

      .caption .quote::before {
        position: static;
        display: block;
        text-align: center;
        margin-bottom: 0.3rem;
        font-size: 2rem;
      }

      .caption .attribution { font-size: 0.8rem; }
    }

    @media (min-width: 641px) and (max-width: 1024px) {
      .caption .quote { font-size: 1.15rem; }
    }

    @media (min-height: 900px) {
      .image-frame { margin-bottom: 3rem; }
    }
  </style>
</head>
<body>
  <main class="container">
    <figure class="image-frame">
      <span class="glyph">💪</span>
    </figure>
    <figcaption class="caption">
      <p class="quote">骨子里有光的人，总以为自己住的是平地。</p>
      <p class="attribution"><span class="dash"></span>肌肉记忆</p>
    </figcaption>
  </main>
</body>
</html>
